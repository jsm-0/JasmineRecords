<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasmine Records</title>
    <link rel="stylesheet" href="style/style.css">
    <!-- Google Font Source Serif 4 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">

<body>
    <nav>
        <div class="header">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo" width="234px" height="29px">
            </div>
            <ul>
                <li><a href="#">A Propos</a></li>
                <li><a href="#">Connexion</a></li>
                <li><a href="#">Catalogue</a></li>
            </ul>
        </div>
    </nav>
    <div class="Intro">
        <h1>Tous vos albums préférés, en quelques clics</h1>
        <div class="button-container">
            <button>Catalogue</button>
            <button>Se connecter / Créer un compte</button>
        </div>
    </div>
    <section class="gallery-section">
        <h2>La selection du mois</h2>
        <div class="gallery">
            <div class="gallery-item"><img src="assets/blond-FrankOcean.jpg" alt="blond album cover"></div>
            <div class="gallery-item"><img src="assets/PARTYNEXTDOOR-PARTYNEXTDOOR.jpg" alt="PARTYNEXTDOOR album cover"></div>
            <div class="gallery-item"><img src="assets/Sail Out-Jhené Aiko.jpg" alt="Sail Out album cover"></div>
            <div class="gallery-item"><img src="assets/Wasteland-BrentFayiaz.jpg" alt="Wasteland album cover"></div>
            <div class="gallery-item"><img src="assets/Channel Orange-Frank Ocean.jpg" alt="Channel Orange album cover"></div>
            <div class="gallery-item"><img src="assets/SZA-Ctrl.jpg" alt="SZA Ctrl album cover"></div>
        </div>
    </section>


</body>

</html>
